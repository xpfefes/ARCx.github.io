<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Driver & Software -</title>
  <style>
    :root {
      --intel-blue: #00285a;
      --intel-link: #0068b5;
      --intel-yellow: #ffc400;
      --bg-gray: #f4f7fa;
      --text-dark: #333;
    }

    body {
      margin: 0;
      background: var(--bg-gray);
      color: var(--text-dark);
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    .container {
      max-width: 950px;
      margin: 30px auto;
      background: #fff;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      border-radius: 4px;
      overflow: hidden;
    }

    /* Alert Stile Intel */
    #legacy-alert {
      display: none;
      background-color: #fff3cd;
      border-left: 5px solid var(--intel-yellow);
      padding: 15px 25px;
      margin: 0;
      color: #856404;
      font-size: 15px;
      align-items: center;
      justify-content: space-between;
    }

    .alert-link {
      color: var(--intel-link);
      font-weight: bold;
      text-decoration: underline;
      cursor: pointer;
    }

    .hero-section {
      background-color: var(--intel-blue);
      color: white;
      padding: 35px;
    }

    .hero-section h1 {
      font-size: 28px;
      font-weight: 300;
      margin: 0 0 25px 0;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 12px;
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 4px;
    }

    .label { font-weight: bold; color: #accbff; font-size: 14px; }
    .value { font-weight: 300; }

    select {
      width: 100%;
      max-width: 400px;
      padding: 10px;
      border-radius: 3px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    .content { padding: 30px; }

    .btn-download {
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: var(--intel-link);
      color: white;
      padding: 18px;
      text-decoration: none;
      font-weight: bold;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }

    .btn-download:hover { background-color: #004a82; }
    .btn-download span { font-size: 13px; font-weight: normal; margin-top: 5px; }

    .info-box {
      border: 1px solid #e2e2e2;
      padding: 20px;
      margin-top: 20px;
      background: #fafafa;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 3px;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 15px;
      text-transform: uppercase;
    }

    .badge-new { background: #00c853; color: white; }
    .badge-legacy { background: #757575; color: white; }

    .sha-code {
      font-family: monospace;
      background: #eee;
      padding: 8px;
      display: block;
      margin-top: 5px;
      font-size: 12px;
      word-break: break-all;
    }

    ul { padding-left: 20px; line-height: 1.6; color: #555; }
  </style>
</head>
<body>

<div class="container">
  <div id="legacy-alert">
    <span>⚠️ <strong>Nota:</strong> newer version of this software is available, which includes functional and security updates..</span>
    <span class="alert-link" onclick="loadVersion('v7')"> click here to update to the latest version </span>
  </div>

  <div class="hero-section">
    <h1 id="ui-title">Caricamento...</h1>
    <div class="meta-grid">
      <div class="label">ID PRODOTTO</div>
      <div class="value" id="ui-id">--</div>
      <div class="label">DATA RILASCIO</div>
      <div class="value" id="ui-date">--</div>
      <div class="label">VERSIONE</div>
      <div class="value">
        <select id="versionSelector" onchange="changeVersion()">
          <option value="v6">XRMOT v4.2.1 </option>
          <option value="v7">Pacchetto Xe-2.0 </option>
          <option value="v8">Software Studio Accelerator</option>
          <option value="v2">Intel® Arc™ 33.0.102.2131 WHQL</option>
          <option value="v3">1.21 Legacy Game On</option>
          <option value="v4">Old Control Panel SDK (Legacy)</option>
        </select>
      </div>
    </div>
  </div>

  <div class="content">
    <div id="ui-badge"></div>
    <h2 style="font-weight: 400; border-bottom: 1px solid #ddd; padding-bottom: 10px;">Descrizione Software</h2>
    <div id="ui-desc" style="margin-bottom: 30px; line-height: 1.6;"></div>

    <div class="info-box">
      <button class="btn-download" onclick="startDownload()">
        SCARICA ORA
        <span id="ui-filename">nome_file.zip</span>
      </button>
      
      <div style="margin-top: 20px; font-size: 14px;">
        <strong>Sistemi supportati:</strong> <span id="ui-os">--</span><br><br>
        <strong>Checksum SHA256:</strong>
        <span class="sha-code" id="ui-sha">--</span>
      </div>
    </div>
  </div>
</div>

<script>
  const database = {
    v6: {
      title: "XRMOT - eXtreme Resource Manager Optimization Tool",
      id: "XRMOT-421", date: "30/04/2026", isLegacy: false,
      desc: "Tool avanzato per l'ottimizzazione. <ul><li>Priorità CPU </li><li>Libera VRAM</li><li>Pulizia RAM-cache</li><li>Ritorno allo stato originale alla chiusura</li></ul>",
      file: "XRMOT_v4.2.1 ", os: "Windows 10/11", sha: "8F4E2C1B9A0D7F6E5D4C3B2A1F0E9D8C7B6A5F4E3D2C1B0A9F8E7D6C5B4A3928",
      url: "https://drive.google.com/drive/folders/1U5ILjzK-W6B-R1AFDRuQ0jWji2vrZWAG"
    },
    v7: {
      title: "Pacchetto Xe-2.0 - Driver & Software ",
      id: "XE-2026-V2", date: "01/05/2026", isLegacy: false,
      desc: "L'ultimo standard per l'architettura Intel Xe. Include ottimizzazioni kernel e supporto esteso per le nuove librerie.",
      file: "Intel_Xe_Package_2.0", os: " Any", sha: "AAABBBCCCDDDEEEFFF111222333444555666777888999000AAABBBCCCDDDEEEF",
      url: "https://drive.google.com/drive/folders/1naCyvxiBd3ZwUsu5P1q7tuixYzE-hwH2"
    },
    v8: {
      title: "Software Studio Accelerator",
      id: "SSA-PRO", date: "02/05/2026", isLegacy: false,
      desc: "Acceleratore dedicato per software di produzione e suite creative. Ottimizza i tempi",
      file: "Studio_Accelerator", os: "any", sha: "556677889900AABBCCDDEEFF11223344556677889900AABBCCDDEEFF11223344",
      url: "https://drive.google.com/drive/folders/1JHV173PewLwC9sXJVamaORnKKy3lcKV_"
    },
    v2: {
      title: "Intel® Arc™ Graphics - 33.0.102.2131",
      id: "785598", date: "10/05/2026", isLegacy: false,
      desc: "Versione standard WHQL per schede video Intel Arc.",
      file: "gfx_win_102.2131.exe", os: "Windows 10/11 Family*", sha: "9F8E7D6C5B4A3928172635445362718293049586756453423120192837465544",
      url: "https://drive.google.com/uc?export=download&id=1Xud5XxkHYwOSUIPjp3SoMzJCOqwNbdtw"
    },
    v3: {
      title: "Game On Legacy - 1.21",
      id: "892102", date: "21/04/2026", isLegacy: true,
      desc: "Ottimizzazione per hardware datato specifica per Minecraft.",
      file: " game on", os: "Windows 10/11 ", sha: "A1B2C3D4E5F678901234567890ABCDEF1234567890ABCDEF1234567890ABCDEF",
      url: "https://drive.google.com/drive/folders/1p5u_K7c6X_PDKc3diWqnwMoIWELU1FpB?usp=sharing"
    },
    v4: {
      title: "Old Control Panel SDK (Legacy)",
      id: "445123", date: "12/01/2025", isLegacy: true,
      desc: "Vecchio pannello di controllo per compatibilità con impostazioni rimosse.",
      file: "old_panel.", os: "Windows 10", sha: "BBDDCC11223344556677889900AABBCCDDEEFF11223344556677889900AABBCC",
      url: "https://drive.google.com/uc?export=download&id=1FMxlcMH__KeSqMOuahNUHN47S3AeYrDo"
    }
  };

  function changeVersion() {
    const key = document.getElementById("versionSelector").value;
    const data = database[key];

    // Aggiorna Testi
    document.getElementById("ui-title").innerText = data.title;
    document.getElementById("ui-id").innerText = data.id;
    document.getElementById("ui-date").innerText = data.date;
    document.getElementById("ui-desc").innerHTML = data.desc;
    document.getElementById("ui-filename").innerText = data.file;
    document.getElementById("ui-os").innerText = data.os;
    document.getElementById("ui-sha").innerText = data.sha;

    // Gestione Alert Legacy
    const alertBox = document.getElementById("legacy-alert");
    alertBox.style.display = data.isLegacy ? "flex" : "none";

    // Badge
    const badge = document.getElementById("ui-badge");
    if(data.isLegacy) {
      badge.innerHTML = '<span class="badge badge-legacy"> Legacy</span>';
    } else {
      badge.innerHTML = '<span class="badge badge-new">New Release</span>';
    }
  }

  // Funzione per forzare il caricamento di una versione specifica (usata dal link nell'alert)
  function loadVersion(v) {
    document.getElementById("versionSelector").value = v;
    changeVersion();
  }

  function startDownload() {
    const val = document.getElementById("versionSelector").value;
    window.open(database[val].url, "_blank");
  }

  // Init
  changeVersion();
</script>

</body>
</html>
