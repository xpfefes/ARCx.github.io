<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Driver & Software Archive</title>
  <style>
    :root {
      --intel-blue: #001f46;
      --intel-blue-2: #00285a;
      --intel-link: #0068b5;
      --bg-gray: #f4f7fa;
      --text-dark: #1f2937;
      --muted: #5b6472;
      --border: #dfe5ec;
      --panel: #ffffff;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);

      --archived-bg: #fff7e6;
      --archived-text: #6f5200;
      --archived-border: #d6a100;

      --new-bg: #e8f3ff;
      --new-text: #0b4f8a;
      --new-border: #86bdf2;

      --beta-bg: #f2edff;
      --beta-text: #5b3aa6;
      --beta-border: #b79dff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg-gray);
      color: var(--text-dark);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .page-wrap {
      width: min(100%, 1040px);
      margin: 20px auto;
      padding: 0 14px 22px;
    }

    .container {
      background: var(--panel);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid rgba(0, 0, 0, 0.05);
    }

    .top-brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: #fff;
    }

    .brand-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .hero-section {
      position: relative;
      color: #fff;
      padding: clamp(18px, 4vw, 34px);
      background: var(--intel-blue);
      background-image: 
        radial-gradient(rgba(255,255,255,0.12) 1px, transparent 1px),
        radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
        linear-gradient(180deg, var(--intel-blue) 0%, #00336f 100%);
      background-size: 18px 18px, 28px 28px, auto;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .hero-section h1 {
      font-size: clamp(22px, 3.2vw, 32px);
      font-weight: 300;
      margin-bottom: 18px;
      letter-spacing: 0.2px;
      line-height: 1.2;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 145px minmax(0, 1fr);
      gap: 12px 14px;
      background: rgba(255, 255, 255, 0.07);
      padding: 16px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .label {
      font-weight: 700;
      color: #cde0ff;
      font-size: 13px;
      align-self: center;
    }

    .value {
      font-weight: 400;
      word-break: break-word;
      align-self: center;
    }

    select {
      width: 100%;
      max-width: 460px;
      padding: 11px 12px;
      border-radius: 7px;
      border: 1px solid #cbd5e1;
      font-size: 15px;
      background: #fff;
      color: #111827;
      outline: none;
      transition: all 0.2s ease;
    }

    select:focus {
      border-color: var(--intel-link);
      box-shadow: 0 0 0 3px rgba(0, 104, 181, 0.18);
    }

    .content {
      padding: clamp(18px, 4vw, 30px);
    }

    #legacy-alert {
      display: none;
      background: var(--archived-bg);
      border: 1px solid #efd48a;
      border-left: 6px solid var(--archived-border);
      color: var(--archived-text);
      padding: 16px 18px;
      border-radius: 10px;
      margin-bottom: 22px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    #legacy-alert.show {
      display: flex;
    }

    .alert-link {
      color: var(--intel-link);
      font-weight: 700;
      text-decoration: underline;
      cursor: pointer;
    }

    .section-title {
      font-weight: 500;
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 10px;
      margin-bottom: 14px;
      font-size: clamp(18px, 2.2vw, 22px);
    }

    .info-box {
      border: 1px solid var(--border);
      padding: clamp(16px, 3vw, 22px);
      background: #fafafa;
      border-radius: 12px;
    }

    .btn-download {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background-color: var(--intel-link);
      color: #fff;
      padding: 16px 18px;
      text-decoration: none;
      font-weight: 700;
      border-radius: 10px;
      width: 100%;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(0, 104, 181, 0.3);
      font-size: 15px;
    }

    .btn-download:hover {
      background-color: #004a82;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 104, 181, 0.4);
    }

    .sha-code {
      font-family: ui-monospace, monospace;
      background: #eef2f7;
      padding: 10px 12px;
      margin-top: 6px;
      font-size: 12px;
      word-break: break-all;
      border-radius: 7px;
      border: 1px solid #d9e2ec;
      display: block;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .badge-new { background: var(--new-bg); color: var(--new-text); border: 1px solid var(--new-border); }
    .badge-archived { background: #eef0f2; color: #525f6b; border: 1px solid #d4d9de; }
    .badge-beta { background: var(--beta-bg); color: var(--beta-text); border: 1px solid var(--beta-border); }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px 18px;
      color: #6b7280;
      font-size: 12px;
      border-top: 1px solid #edf1f5;
      background: #fff;
      flex-wrap: wrap;
      gap: 12px;
    }

    @media (max-width: 768px) {
      .meta-grid {
        grid-template-columns: 1fr;
      }
      .footer {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>

      <div id="legacy-alert">

      <div class="hero-section">
        <h1 id="ui-title">Caricamento...</h1>
        <div class="meta-grid">

        </div>
      </div>

      <div class="content">
        <div id="ui-badge"></div>
        <h2 class="section-title">Descrizione Software</h2>
        <div id="ui-desc"></div>

        <div class="info-box">
          <a class="btn-download" id="downloadLink" href="#" target="_blank" rel="noopener noreferrer">
            SCARICA ORA
            <span id="ui-filename">nome_file.zip</span>
          </a>

          <div class="meta-detail" style="margin-top: 20px; font-size: 14px; color: #374151;">
            <strong>Sistemi supportati:</strong> <span id="ui-os">--</span><br><br>
            <strong>Checksum SHA256:</strong><br>
            <span class="sha-code" id="ui-sha">--</span>
          </div>
        </div>
      </div>

      <div class="footer">
        <div>Intel®</div>
        <div>© Archivio software</div>
      </div>
    </div>
  </div>

    function changeVersion() {
      const key = document.getElementById("versionSelector").value;
      const data = database[key];

      document.getElementById("ui-title").textContent = data.title;
      document.getElementById("ui-id").textContent = data.id;
      document.getElementById("ui-date").textContent = data.date;
      document.getElementById("ui-desc").innerHTML = data.desc;
      document.getElementById("ui-filename").textContent = data.file;
      document.getElementById("ui-os").textContent = data.os;
      document.getElementById("ui-sha").textContent = data.sha;

      const alertBox = document.getElementById("legacy-alert");
      if (data.isArchived) {
        alertBox.classList.add("show");
        document.getElementById("legacy-alert-text").innerHTML = data.alert;
        document.querySelector(".alert-link").textContent = data.alertAction;
      } else {
        alertBox.classList.remove("show");
      }

      const badge = document.getElementById("ui-badge");
      if (data.status === "archived") {
        badge.innerHTML = '<span class="badge badge-archived">ARCHIVIATO</span>';
      } else if (data.status === "beta") {
        badge.innerHTML = '<span class="badge badge-beta">BETA</span>';
      } else {
        badge.innerHTML = '<span class="badge badge-new">NEW RELEASE</span>';
      }

      document.getElementById("downloadLink").href = data.url;
    }

    function loadVersion(v) {
      document.getElementById("versionSelector").value = v;
      changeVersion();
    }

    // Avvio
    changeVersion();
  </script>

</html>
