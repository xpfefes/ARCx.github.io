<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drive & Software</title>
  <style>
    :root {
      --intel-blue: #00285a;
      --intel-blue-dark: #001235;
      --intel-link: #0068b5;
      --bg-gray: #f4f7fa;
      --text-dark: #1f2937;
      --text-light: #ffffff;
      --muted: #5b6472;
      --border: #dfe5ec;
      --panel: #ffffff;
      
      --archived-bg: #fff7e6;
      --archived-text: #6f5200;
      --archived-border: #d6a100;

      --legacy-bg: #fff0f0;
      --legacy-text: #b3261e;
      --legacy-border: #f4a29d;

      --new-bg: #e8f3ff;
      --new-text: #0b4f8a;
      --new-border: #86bdf2;

      --beta-bg: #f2edff;
      --beta-text: #5b3aa6;
      --beta-border: #b79dff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      background: var(--bg-gray);
      color: var(--text-dark);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .top-nav {
      display: flex;
      align-items: center;
      padding: 10px 20px;
      background: #fff;
      border-bottom: 1px solid var(--border);
    }

    .brand-mark {
      margin-right: 15px;
    }

    .nav-title {
      color: var(--intel-link);
      font-size: 16px;
      padding-left: 15px;
      border-left: 1px solid var(--border);
    }

    .hero-section {
      background-color: var(--intel-blue);
      background-image: 
        linear-gradient(135deg, rgba(255,255,255,0.03) 25%, transparent 25%),
        linear-gradient(225deg, rgba(255,255,255,0.03) 25%, transparent 25%),
        linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%),
        linear-gradient(315deg, rgba(255,255,255,0.03) 25%, var(--intel-blue-dark) 100%);
      background-size: 40px 40px;
      color: var(--text-light);
      padding: 40px 20px 50px;
    }

    .hero-content {
      max-width: 900px;
      margin: 0 auto;
    }

    .hero-section h1 {
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 300;
      margin-bottom: 40px;
      line-height: 1.2;
    }

    .meta-data {
      display: grid;
      grid-template-columns: 80px minmax(0, 1fr);
      gap: 16px 24px;
      align-items: center;
      font-size: 16px;
    }

    .meta-label {
      color: #b0c4de;
      font-weight: 400;
    }

    .meta-value {
      font-weight: 400;
    }

    select {
      width: 100%;
      max-width: 500px;
      padding: 10px 14px;
      border-radius: 20px;
      border: none;
      font-size: 15px;
      background: #fff;
      color: #111827;
      outline: none;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    select:focus {
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.3);
    }

    .main-content {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 20px;
      background: transparent;
    }

    .alert-box {
      display: none;
      padding: 16px 20px;
      border-radius: 8px;
      margin-bottom: 24px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 15px;
    }

    .alert-legacy {
      background: var(--legacy-bg);
      border-left: 6px solid var(--legacy-border);
      color: var(--legacy-text);
    }

    .alert-archived {
      background: var(--archived-bg);
      border-left: 6px solid var(--archived-border);
      color: var(--archived-text);
    }

    .alert-box.show {
      display: flex;
    }

    .alert-link {
      background: #fff;
      color: var(--text-dark);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: 1px solid #ccc;
      transition: background 0.2s;
    }
    .alert-link:hover { background: #f0f0f0; }

    .section-title {
      font-size: 24px;
      font-weight: 400;
      margin-bottom: 16px;
      color: var(--text-dark);
    }

    .desc-text {
      color: #4b5563;
      margin-bottom: 30px;
    }
    
    .desc-text ul {
      margin-top: 10px;
      padding-left: 20px;
    }

    .specs-box {
      background: #fff;
      border: 1px solid var(--border);
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 30px;
    }

    .specs-title {
      font-weight: 600;
      margin-bottom: 10px;
      font-size: 16px;
    }

    .btn-download {
      display: inline-block;
      background-color: var(--intel-link);
      color: #fff;
      padding: 12px 24px;
      text-decoration: none;
      font-weight: 600;
      border-radius: 4px;
      transition: background 0.2s ease;
      font-size: 16px;
    }

    .btn-download:hover {
      background-color: #004a82;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-new { background: var(--new-bg); color: var(--new-text); border: 1px solid var(--new-border); }
    .badge-archived { background: #eef0f2; color: #525f6b; border: 1px solid #d4d9de; }
    .badge-legacy { background: var(--legacy-bg); color: var(--legacy-text); border: 1px solid var(--legacy-border); }
    .badge-beta { background: var(--beta-bg); color: var(--beta-text); border: 1px solid var(--beta-border); }

    .sha-code {
      font-family: ui-monospace, monospace;
      background: #f8fafc;
      padding: 8px 12px;
      margin-top: 6px;
      font-size: 12px;
      word-break: break-all;
      border-radius: 4px;
      border: 1px solid var(--border);
      display: block;
    }

    @media (max-width: 600px) {
      .meta-data {
        grid-template-columns: 1fr;
        gap: 8px;
      }
      .meta-label {
        margin-top: 10px;
      }
    }
  </style>
</head>
<body>

  <div class="top-nav">
    <svg class="brand-mark" width="80" height="30" viewBox="0 0 120 44" xmlns="http://www.w3.org/2000/svg" aria-label="Intel">

      <text x="18" y="28" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">intel</text>

    <div class="nav-title">Drive & Software</div>

  <div class="hero-section">

        </div>
      </div>
    </div>
  </div>

  <div class="main-content">
    <div id="dynamic-alert" class="alert-box">
      <span id="alert-text"></span>
      <button class="alert-link" onclick="handleAlertClick()" id="alert-btn"></button>
    </div>

    <div id="ui-badge"></div>
    
    <h2 class="section-title">Introduction</h2>
    <div class="desc-text" id="ui-desc"></div>

    <h2 class="section-title">System Requirements</h2>
    <div class="specs-box">
      <div class="specs-title">Operating System & Hardware:</div>
      <div id="ui-os" style="font-size: 15px; color: #374151;">--</div>
    </div>

    <h2 class="section-title">Available Downloads</h2>
    <div style="margin-bottom: 40px;">
      <a class="btn-download" id="downloadLink" href="#" target="_blank" rel="noopener noreferrer">Download</a>
      <div style="margin-top: 15px; font-size: 14px;">
        <strong>File:</strong> <span id="ui-filename" style="color: var(--intel-link);">--</span><br>
        <strong style="display:inline-block; margin-top:8px;">SHA256:</strong>
        <span class="sha-code" id="ui-sha">--</span>
      </div>
    </div>
  </div>

        alertAction: "Vai a Xe-2",

      }

    let currentTargetLink = "";

    function changeVersion() {
      const key = document.getElementById("versionSelector").value;
      const data = database[key];

      document.getElementById("ui-title").textContent = data.title;
      document.getElementById("ui-id").textContent = data.id;
      document.getElementById("ui-date").textContent = data.date;
      document.getElementById("ui-desc").innerHTML = data.desc;
      document.getElementById("ui-filename").textContent = data.file;
      document.getElementById("ui-os").innerHTML = data.os;
      document.getElementById("ui-sha").textContent = data.sha;

      const alertBox = document.getElementById("dynamic-alert");
      alertBox.className = "alert-box"; 
      
      if (data.alertType === "legacy") {
        alertBox.classList.add("show", "alert-legacy");
        document.getElementById("alert-text").innerHTML = data.alert;
        document.getElementById("alert-btn").textContent = data.alertAction;
        currentTargetLink = data.targetLink;
      } else if (data.alertType === "archived") {
        alertBox.classList.add("show", "alert-archived");
        document.getElementById("alert-text").innerHTML = data.alert;
        document.getElementById("alert-btn").textContent = data.alertAction;
        currentTargetLink = data.targetLink;
      }

      const badge = document.getElementById("ui-badge");
      if (data.status === "archived") {
        badge.innerHTML = '<span class="badge badge-archived">Archived</span>';
      } else if (data.status === "legacy") {
        badge.innerHTML = '<span class="badge badge-legacy">Legacy</span>';
      } else if (data.status === "beta") {
        badge.innerHTML = '<span class="badge badge-beta">Beta</span>';
      } else {
        badge.innerHTML = '<span class="badge badge-new">Latest</span>';
      }

      document.getElementById("downloadLink").href = data.url;
    }

    function handleAlertClick() {
      if(currentTargetLink) {
        document.getElementById("versionSelector").value = currentTargetLink;
        changeVersion();
      }
    }

    // Avvio iniziale
    changeVersion();

</html>
